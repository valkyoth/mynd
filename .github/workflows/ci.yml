name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Format, lint, test, policy, and audit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install supported Rust toolchains
        run: rustup toolchain install 1.90.0 1.97.1 --profile minimal --component clippy,rustfmt
      - name: Install security tools
        run: |
          cargo install --locked cargo-deny --version 0.20.2
          cargo install --locked cargo-audit --version 0.22.2
          cargo install --locked cargo-sbom --version 0.10.0
      - name: Run local check gate
        run: scripts/checks.sh
      - name: Check dependency policy
        run: cargo deny check
      - name: Check RustSec advisories
        run: cargo audit
      - name: Verify committed SBOM
        run: scripts/generate-sbom.sh --check

  rust-compatibility:
    name: Rust ${{ matrix.rust }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        rust: [1.90.0, 1.91.0, 1.92.0, 1.93.0, 1.94.0, 1.95.0, 1.96.0, 1.96.1, 1.97.0, 1.97.1]
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust
        run: rustup toolchain install ${{ matrix.rust }} --profile minimal
      - name: Check core-only workspace
        run: cargo +${{ matrix.rust }} check --workspace --no-default-features
      - name: Test all features
        run: cargo +${{ matrix.rust }} test --workspace --all-features

  platforms:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: Linux, os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { name: Windows, os: windows-latest, target: x86_64-pc-windows-msvc }
          - { name: macOS, os: macos-latest, target: x86_64-apple-darwin }
          - { name: FreeBSD, os: ubuntu-latest, target: x86_64-unknown-freebsd }
          - { name: Android, os: ubuntu-latest, target: aarch64-linux-android }
          - { name: iOS, os: macos-latest, target: aarch64-apple-ios }
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust and target
        shell: bash
        run: |
          rustup toolchain install 1.97.1 --profile minimal
          rustup +1.97.1 target add ${{ matrix.target }}
      - name: Check no_std libraries
        shell: bash
        run: cargo +1.97.1 check --workspace --lib --no-default-features --target ${{ matrix.target }}
