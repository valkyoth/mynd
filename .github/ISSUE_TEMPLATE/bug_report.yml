name: Bug report
description: Report a reproducible mynd bug.
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps, input, or a minimal test case.
    validations:
      required: true
  - type: textarea
    id: limits
    attributes:
      label: Limits and features
      description: Include DecodeLimits, policy, features, target, and Rust version.
    validations:
      required: false
  - type: textarea
    id: security
    attributes:
      label: Security impact
      description: Do not include exploitable private details. Use SECURITY.md.
    validations:
      required: false
